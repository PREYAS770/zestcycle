<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zest Cycle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header>
    <div class="logo">ZestCycle</div>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#products">Products</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- Hero Section -->
<section id="hero">
    <img src="images/banner.jpg" alt="Banner">
    <div class="hero-text">
        <h1>Best Cycles for Every Ride</h1>
        <a href="#products" class="btn">Shop Now</a>
    </div>
</section>

<!-- Products Section -->
<section id="products">
    <h2>Our Cycles</h2>
    <div class="product-grid">
        <div class="product-card">
            <img src="images/cycle1.jpg" alt="Cycle 1">
            <h3>Mountain Bike</h3>
            <p>₹15,000</p>
            <button>Buy</button>
        </div>
        <div class="product-card">
            <img src="images/cycle2.jpg" alt="Cycle 2">
            <h3>Road Bike</h3>
            <p>₹12,000</p>
            <button>Buy</button>
        </div>
        <!-- More cards -->
    </div>
</section>

<!-- About Section -->
<section id="about">
    <h2>About Us</h2>
    <p>ZestCycle provides high-quality cycles for riders of all levels.</p>
    <img src="images/about.jpg" alt="About Image">
</section>

<!-- Contact Section -->
<section id="contact">
    <h2>Contact Us</h2>
    <form>
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <textarea placeholder="Message"></textarea>
        <button type="submit">Send</button>
    </form>
</section>

<!-- Footer -->
<footer>
    <p>&copy; 2026 ZestCycle | Follow us on social media</p>
</footer>

<script src="script.js"></script>
</body>
</html>
